  # backend-project-executor:
  #   extends:
  #     service: backend
  #   container_name: auditagentx-backend-executor
  #   profiles: ["project-executor"]
  #   volumes:
  #     - ./data:/app/data
  #     - ./rules:/app/rules:ro
  #     - /var/run/docker.sock:/var/run/docker.sock   # 高风险：宿主 Docker 控制权

